<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PAPER_TITLE}}</title>

    <!-- MathJax配置 -->
    <script>
    MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true,
            processEnvironments: true,
            tags: 'ams'
        },
        options: {
            skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
            ignoreHtmlClass: 'tex2jax_ignore',
            processHtmlClass: 'tex2jax_process'
        },
        svg: {
            fontCache: 'global'
        }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>

    <style>
        /* CSS变量定义 */
        :root {
            --color-bg: #ffffff;
            --color-bg-secondary: #f5f5f7;
            --color-text: #1d1d1f;
            --color-text-secondary: #6e6e73;
            --color-accent: #0071e3;
            --color-border: #d2d2d7;
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-family-mono: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace;
            --spacing-xs: 8px;
            --spacing-sm: 16px;
            --spacing-md: 24px;
            --spacing-lg: 48px;
            --spacing-xl: 80px;
            --spacing-xxl: 120px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.16);
        }

        /* 深色模式变量 */
        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg: #000000;
                --color-bg-secondary: #1d1d1f;
                --color-text: #f5f5f7;
                --color-text-secondary: #a1a1a6;
                --color-accent: #2997ff;
                --color-border: #424245;
            }
        }

        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: var(--font-family);
            color: var(--color-text);
            background-color: var(--color-bg);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 容器 */
        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 0 var(--spacing-md);
        }

        /* 导航栏 */
        .nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--color-border);
            padding: var(--spacing-sm) 0;
            z-index: 1000;
            transition: background 0.3s ease;
        }

        @media (prefers-color-scheme: dark) {
            .nav {
                background: rgba(0, 0, 0, 0.8);
            }
        }

        .nav-content {
            max-width: 980px;
            margin: 0 auto;
            padding: 0 var(--spacing-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--color-text);
        }

        .nav-links {
            display: flex;
            gap: var(--spacing-md);
            list-style: none;
        }

        .nav-links a {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-secondary);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--color-accent);
        }

        /* 标题区域 */
        .hero {
            padding: var(--spacing-xxl) 0 var(--spacing-xl) 0;
            text-align: center;
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 600;
            line-height: 1.07;
            letter-spacing: -0.005em;
            margin-bottom: var(--spacing-md);
        }

        .hero .authors {
            font-size: 19px;
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-sm);
        }

        .hero .meta {
            font-size: 15px;
            color: var(--color-text-secondary);
        }

        /* 章节 */
        .section {
            margin: var(--spacing-xxl) 0;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section h2 {
            font-size: 40px;
            font-weight: 600;
            line-height: 1.1;
            margin-bottom: var(--spacing-md);
        }

        .section h3 {
            font-size: 28px;
            font-weight: 600;
            line-height: 1.14;
            margin-top: var(--spacing-lg);
            margin-bottom: var(--spacing-sm);
        }

        .section h4 {
            font-size: 21px;
            font-weight: 600;
            line-height: 1.19;
            margin-top: var(--spacing-md);
            margin-bottom: var(--spacing-sm);
        }

        .section p {
            font-size: 17px;
            line-height: 1.47;
            letter-spacing: -0.022em;
            margin-bottom: var(--spacing-sm);
        }

        /* 卡片 */
        .card {
            background: var(--color-bg-secondary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin: var(--spacing-md) 0;
        }

        .card.highlight {
            border-left: 4px solid var(--color-accent);
        }

        /* 公式 */
        .math-display {
            overflow-x: auto;
            margin: var(--spacing-md) 0;
            padding: var(--spacing-sm) 0;
        }

        /* 代码块 */
        code {
            font-family: var(--font-family-mono);
            font-size: 0.9em;
            background-color: var(--color-bg-secondary);
            padding: 2px 6px;
            border-radius: 4px;
        }

        pre {
            background-color: var(--color-bg-secondary);
            padding: var(--spacing-sm);
            border-radius: var(--radius-md);
            overflow-x: auto;
            margin: var(--spacing-md) 0;
        }

        pre code {
            background: none;
            padding: 0;
        }

        /* 表格 */
        .table-container {
            overflow-x: auto;
            margin: var(--spacing-md) 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--color-border);
        }

        th {
            font-weight: 600;
            background-color: var(--color-bg-secondary);
        }

        tr:hover {
            background-color: var(--color-bg-secondary);
        }

        /* 图片占位符 */
        .figure-placeholder {
            background: var(--color-bg-secondary);
            border: 2px dashed var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            text-align: center;
            color: var(--color-text-secondary);
            margin: var(--spacing-md) 0;
            font-style: italic;
        }

        /* 列表 */
        ul, ol {
            margin: var(--spacing-sm) 0;
            padding-left: var(--spacing-lg);
        }

        li {
            margin: var(--spacing-xs) 0;
            line-height: 1.5;
        }

        /* 评论区域 */
        .review {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin: var(--spacing-xl) 0;
        }

        .review h3 {
            color: white;
            margin-top: 0;
        }

        .review-section {
            margin: var(--spacing-md) 0;
        }

        .review-section h4 {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: var(--spacing-sm);
        }

        .review-section ul {
            list-style: none;
            padding-left: 0;
        }

        .review-section li {
            padding-left: var(--spacing-md);
            position: relative;
        }

        .review-section li:before {
            content: "•";
            position: absolute;
            left: 0;
            color: rgba(255, 255, 255, 0.7);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 40px;
            }

            .section h2 {
                font-size: 32px;
            }

            .section h3 {
                font-size: 24px;
            }

            .nav-links {
                display: none;
            }

            :root {
                --spacing-xl: 60px;
                --spacing-xxl: 80px;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 32px;
            }

            .section h2 {
                font-size: 28px;
            }

            .section p {
                font-size: 16px;
            }
        }

        /* 打印样式 */
        @media print {
            .nav {
                display: none;
            }

            .section {
                opacity: 1;
                transform: none;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="nav">
        <div class="nav-content">
            <div class="nav-title">{{PAPER_TITLE_SHORT}}</div>
            <ul class="nav-links">
                <li><a href="#motivation">动机</a></li>
                <li><a href="#method">方法</a></li>
                <li><a href="#experiments">实验</a></li>
                <li><a href="#results">结果</a></li>
                <li><a href="#review">评论</a></li>
            </ul>
        </div>
    </nav>

    <!-- 标题区域 -->
    <div class="hero">
        <div class="container">
            <h1>{{PAPER_TITLE}}</h1>
            <div class="authors">{{AUTHORS}}</div>
            <div class="meta">{{VENUE}} | {{DATE}}</div>
        </div>
    </div>

    <!-- 主要内容 -->
    <main class="container">
        {{CONTENT}}
    </main>

    <!-- 渐入动画脚本 -->
    <script>
        // Intersection Observer for fade-in animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        // Observe all sections
        document.querySelectorAll('.section').forEach(section => {
            observer.observe(section);
        });

        // Smooth scroll for navigation links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    </script>
</body>
</html>
